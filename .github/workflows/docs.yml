name: Docs

on:
  push:
    branches:
      - main
      - refactor/ai-factory-architecture
  delete:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with:
          name: nix-agentic-tools

      - name: Build docs
        run: |
          nix build .#docs
          cp -rL result docs-out
          chmod -R u+w docs-out

      - name: Deploy to root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-out
          exclude_assets: "pr/**"

  deploy-preview:
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with:
          name: nix-agentic-tools

      - name: Build docs
        run: |
          nix build .#docs
          cp -rL result docs-out
          chmod -R u+w docs-out

      - name: Fix base paths for preview
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euETo pipefail
          shopt -s inherit_errexit 2>/dev/null || :
          BASE="/nix-agentic-tools/pr/${BRANCH}"
          # Rewrite mdbook HTML paths (excluding options/, which is
          # a separate NuschtOS SPA with its own base href handled
          # below). Without this exclusion, options/*.html would be
          # rewritten twice — once here to /nix-agentic-tools/pr/
          # <branch>/ and again below to /nix-agentic-tools/pr/
          # <branch>/options/, producing a doubled path like
          # /nix-agentic-tools/pr/<branch>/pr/<branch>/options/
          # that 404s every SPA asset fetch.
          find docs-out -name '*.html' -not -path 'docs-out/options/*' -exec \
            sed -i "s|/nix-agentic-tools/|${BASE}/|g" {} +
          # Rewrite NuschtOS options-search base href (single pass).
          sed -i "s|/nix-agentic-tools/options/|${BASE}/options/|g" \
            docs-out/options/index.html \
            docs-out/options/index.csr.html

      - name: Deploy preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-out
          destination_dir: pr/${{ github.ref_name }}
          keep_files: false

  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Remove preview
        env:
          BRANCH: ${{ github.event.ref }}
        run: |
          PREVIEW_DIR="pr/${BRANCH}"
          if [ -d "$PREVIEW_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PREVIEW_DIR"
            git commit -m "chore: remove preview for deleted branch ${BRANCH}"
            git push
          else
            echo "No preview directory found for ${BRANCH}, skipping"
          fi
