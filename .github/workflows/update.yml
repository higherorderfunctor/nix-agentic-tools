name: Update

on:
  push:
    branches: [refactor/ai-factory-architecture]
  schedule:
    - cron: "0 */1 * * *" # hourly
  workflow_dispatch:

concurrency:
  group: update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

# TODO: remove once DeterminateSystems/nix-installer-action ships node24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Phase 1: update sources + compute hashes (linux only — hashes are
  # platform-independent since nvfetcher tracks per-platform entries)
  update:
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: refactor/ai-factory-architecture
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: nix-agentic-tools
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Run update pipeline
        run: devenv tasks run --mode before update:all
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify
        run: nix flake check --no-build

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: automated update (sources + hashes) [skip ci]"
            git pull --rebase origin "$BRANCH_NAME" || true
            git push origin "HEAD:$BRANCH_NAME"
          fi

  # Phase 2: build all packages per-platform and push to cachix.
  # Runs AFTER update so builds use the latest sources + hashes.
  build:
    needs: update
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Re-checkout to pick up any commits from the update job
          ref: refactor/ai-factory-architecture

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: nix-agentic-tools
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build all packages (populates cachix)
        run: |
          nix profile install nixpkgs#nix-fast-build
          nix-fast-build \
            --flake ".#packages" \
            --systems "${{ matrix.system }}" \
            --skip-cached \
            --cachix-cache nix-agentic-tools \
            --no-nom \
            --no-link
