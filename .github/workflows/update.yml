# CI pipeline v4: ninja-based DAG update pipeline.
#
# "Stage, Validate, Push" — updates only land on the branch after
# BOTH x86_64-linux and aarch64-darwin builds pass.
#
# Phase 1 (ubuntu): run ninja pipeline, push to staging ref
# Phase 2 (per-platform matrix): build all packages from staging ref
# Phase 3 (ubuntu): fast-forward real branch to staging ref
#
# See: config/generate-update-ninja.nix, dev/scripts/update-*.sh
name: Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BRANCH_NAME: refactor/ai-factory-architecture

jobs:
  # ── Phase 1: ninja update pipeline (ubuntu-only) ─────────────────
  update:
    runs-on: ubuntu-latest
    outputs:
      staging-ref: ${{ steps.push-staging.outputs.staging-ref }}
      has-changes: ${{ steps.push-staging.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      # Daemon mode: derivations built during nix-update get pushed
      # to cachix immediately. Phase 2 runners fetch as substitutions.
      - uses: cachix/cachix-action@v17
        with:
          name: nix-agentic-tools
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Install tools the ninja pipeline needs in PATH.
      # nix-fast-build and nix-update resolve via `nix run --inputs-from .`
      - name: Install pipeline tools
        run: |
          nix profile install \
            nixpkgs#ninja \
            nixpkgs#jq
          nix profile install --inputs-from . nixpkgs#devenv
          nix profile install ".#formatter.x86_64-linux"

      # Generate ninja build file and run the full DAG.
      # MERGE_LOCK overridden: /run/user/$UID/ may not exist on GHA.
      # -k0: continue all targets regardless of failures.
      - name: Run ninja update pipeline
        run: |
          set -euETo pipefail
          shopt -s inherit_errexit 2>/dev/null || :
          mkdir -p "$RUNNER_TEMP"
          export MERGE_LOCK="$RUNNER_TEMP/nix-update-merge"
          nix run .#generate-update-ninja
          ninja -j4 -v -k0 -f .update.ninja update-report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Push to a staging ref instead of the real branch.
      # Phase 2 validates on both platforms before the real branch moves.
      - name: Push staging ref
        id: push-staging
        run: |
          set -euETo pipefail
          shopt -s inherit_errexit 2>/dev/null || :
          local_head=$(git rev-parse HEAD)
          remote_head=$(git rev-parse "origin/$BRANCH_NAME" 2>/dev/null || echo "none")
          if [ "$local_head" = "$remote_head" ]; then
            echo "No changes to push"
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          staging_ref="refs/staging/update-${{ github.run_id }}"
          git push origin "HEAD:$staging_ref"
          echo "staging-ref=$staging_ref" >> "$GITHUB_OUTPUT"
          echo "has-changes=true" >> "$GITHUB_OUTPUT"

      - name: Upload update report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-report
          path: .update-report.txt
          if-no-files-found: ignore

      - name: Print update report
        if: always()
        run: |
          if [ -f .update-report.txt ]; then
            echo "::group::Update Report"
            bash dev/scripts/update-report.sh
            echo "::endgroup::"
          else
            echo "No report generated"
          fi

  # ── Phase 2: cross-platform build validation ───────────────────
  validate:
    needs: update
    if: needs.update.outputs.has-changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.update.outputs.staging-ref }}

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      # Daemon mode: pushes every completed derivation to cachix.
      - uses: cachix/cachix-action@v17
        with:
          name: nix-agentic-tools
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Build ALL packages. x86_64-linux is ~100% cache hits from
      # Phase 1 (cachix daemon pushed during ninja builds).
      # aarch64-darwin builds fresh here.
      - name: Build all packages
        run: |
          nix run --inputs-from . nix-fast-build -- \
            --skip-cached \
            --no-nom \
            --no-link \
            --flake ".#packages.${{ matrix.system }}"

      # Warm devenv cache. Overlay packages are cachix hits from the
      # build step; only devenv-specific glue builds locally.
      - name: Warm devenv cache
        run: |
          nix profile install --inputs-from . nixpkgs#devenv
          devenv print-dev-env --verbose > /dev/null
        env:
          DEVENV_TUI: "false"

  # ── Phase 3: promote staging ref to real branch ────────────────
  # Only runs if BOTH Phase 2 jobs succeed (default needs: behavior).
  promote:
    needs: [update, validate]
    if: needs.update.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Fast-forward the real branch to the staging ref.
      # Rebases on remote if the branch moved during the run.
      - name: Promote staging to branch
        run: |
          set -euETo pipefail
          shopt -s inherit_errexit 2>/dev/null || :
          staging_ref="${{ needs.update.outputs.staging-ref }}"
          git fetch origin "$staging_ref"
          staging_sha=$(git rev-parse FETCH_HEAD)
          git fetch origin "$BRANCH_NAME"
          git checkout "origin/$BRANCH_NAME"
          max_retries=3
          for attempt in $(seq 1 $max_retries); do
            if git cherry-pick "origin/$BRANCH_NAME".."$staging_sha"; then
              if git push origin "HEAD:$BRANCH_NAME"; then
                echo "Promoted staging ref to $BRANCH_NAME (attempt $attempt)"
                break
              fi
            fi
            echo "Attempt $attempt failed, retrying..."
            git cherry-pick --abort 2>/dev/null || true
            git fetch origin "$BRANCH_NAME"
            git checkout "origin/$BRANCH_NAME"
          done

      # Clean up the staging ref regardless of success/failure.
      - name: Cleanup staging ref
        if: always()
        run: |
          git push origin --delete "${{ needs.update.outputs.staging-ref }}" 2>/dev/null || true
