name: Update

on:
  push:
    branches: [refactor/ai-factory-architecture]
  schedule:
    - cron: "0 */1 * * *" # hourly
  workflow_dispatch:

concurrency:
  group: update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

# TODO: remove once DeterminateSystems/nix-installer-action ships node24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Phase 1: system-agnostic source updates (no building) ────────
  update-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
      # Phase 1 uses the lightweight CI shell (flake.nix devShells.ci)
      # instead of the full devenv shell — avoids 7+ min module eval.
      - name: Update flake inputs
        run: nix develop .#ci -c nix flake update
      - name: Update devenv lock
        run: nix develop .#ci -c devenv update
      - name: Update nvfetcher sources
        run: nix develop .#ci -c nvfetcher -o .nvfetcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Regenerate npm lockfiles
        run: nix develop .#ci -c bash dev/scripts/update-locks.sh
      - name: Upload updated sources
        uses: actions/upload-artifact@v4
        with:
          name: updated-sources
          path: |
            .nvfetcher/
            overlays/locks/
            flake.lock
            devenv.lock

  # ── Phase 2: per-platform hashes + build + cachix ────────────────
  build:
    needs: update-sources
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: updated-sources
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with:
          name: nix-agentic-tools
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Compute dep hashes
        run: devenv tasks run update:hashes
      - name: Upload hashes
        uses: actions/upload-artifact@v4
        with:
          name: hashes-${{ matrix.system }}
          path: overlays/hashes.json
      - name: Build all packages
        run: devenv tasks run build:all

  # ── Phase 3: merge hashes + commit ───────────────────────────────
  commit:
    needs: build
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: refactor/ai-factory-architecture
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: updated-sources
      - uses: actions/download-artifact@v4
        with:
          name: hashes-x86_64-linux
          path: /tmp/hashes-linux
      - uses: actions/download-artifact@v4
        with:
          name: hashes-aarch64-darwin
          path: /tmp/hashes-darwin
      - name: Merge platform hashes
        run: |
          jq -s '.[0] * .[1]' \
            /tmp/hashes-linux/hashes.json \
            /tmp/hashes-darwin/hashes.json \
            > overlays/hashes.json
      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: automated update (sources + hashes) [skip ci]"
            git pull --rebase origin "$BRANCH_NAME" || true
            git push origin "HEAD:$BRANCH_NAME"
          fi
