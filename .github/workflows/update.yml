# CI pipeline v4: Renovate-style per-dependency PRs.
#
# Runs the ninja update pipeline in CI mode (UPDATE_CI=1):
#   - Builds are skipped (PR pipeline validates)
#   - Cherry-picks are skipped (worktree branches pushed as PRs)
#   - Each dependency gets its own branch + PR
#
# ci.yml validates PRs on both platforms (linux + darwin).
# PRs that pass both can be merged.
#
# Uses a GitHub App token so PRs trigger ci.yml's pull_request event.
name: Update

on:
  push:
    branches: [refactor/ai-factory-architecture]
  workflow_dispatch:

concurrency:
  group: update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BRANCH_NAME: refactor/ai-factory-architecture

jobs:
  update:
    runs-on: ubuntu-latest
    # Skip if this push was made by the bot (prevents self-triggering).
    if: >-
      github.actor != 'nix-agentic-tools-bot[bot]'
      || github.event_name == 'workflow_dispatch'
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: nix-agentic-tools
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "nix-agentic-tools-bot[bot]"
          git config user.email "nix-agentic-tools-bot[bot]@users.noreply.github.com"

      - name: Install pipeline tools
        run: |
          nix profile add \
            nixpkgs#ninja \
            nixpkgs#jq
          nix profile add --inputs-from . nixpkgs#devenv
          nix profile add ".#formatter.x86_64-linux"

      # Warm the flake eval cache BEFORE the ninja pipeline.
      # Our overlays use IFD (builtins.readFile on fetchFromGitHub) to
      # compute versions at eval time. Fresh CI runners don't have these
      # sources realized. nix flake check --no-build triggers eval which
      # fetches all sources as a side effect. Cachix daemon pushes them.
      # Warm the nix store with all package sources BEFORE the ninja pipeline.
      # Our overlays use IFD (builtins.readFile on fetchFromGitHub) to
      # compute versions at eval time. Fresh CI runners don't have these
      # sources. Evaluating the packages attrset triggers IFD fetches.
      # --allow-import-from-derivation is required for the eval to fetch.
      # Record base commit before pipeline runs.
      # Used to identify which worktree branches have actual updates.
      - name: Record base commit
        id: base
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Warm: evaluate all package versions to trigger IFD source fetches.
      # builtins.attrNames is lazy — doesn't trigger IFD. We need to force
      # evaluation of each package's version (which reads from fetchFromGitHub
      # sources). mapAttrs + version produces { name = "version-string"; }
      # which forces full eval. Cachix daemon pushes fetched sources.
      - name: Warm flake eval (prefetch all sources)
        run: |
          nix eval --json \
            --option allow-import-from-derivation true \
            --apply 'pkgs: builtins.mapAttrs (n: p: p.version or p.name or "unknown") pkgs' \
            .#packages.x86_64-linux > /dev/null

      # Run ninja pipeline in CI mode:
      # - UPDATE_CI=1: skip builds, skip cherry-picks
      # - Each target creates a worktree branch (update/<name>)
      # - Branches are pushed and PRs created after ninja completes
      - name: Run ninja update pipeline
        run: |
          set -euETo pipefail
          shopt -s inherit_errexit 2>/dev/null || :
          mkdir -p "$RUNNER_TEMP"
          export MERGE_LOCK="$RUNNER_TEMP/nix-update-merge"
          export UPDATE_CI=1
          nix run .#generate-update-ninja
          ninja -j4 -v -k0 -f .update.ninja update-report
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NIX_PATH: nixpkgs=flake:nixpkgs

      # Push worktree branches and create/update PRs.
      # Each update/<name> branch with commits gets a PR.
      - name: Create per-dependency PRs
        run: |
          set -euETo pipefail
          shopt -s inherit_errexit 2>/dev/null || :

          base_head="${{ steps.base.outputs.sha }}"

          # Find all update/* branches with commits ahead of base
          git branch --list 'update/*' | while read -r branch; do
            branch=$(echo "$branch" | tr -d ' *+')
            wt_head=$(git rev-parse "$branch")

            if [ "$wt_head" = "$base_head" ]; then
              echo "Skipping $branch (no changes)"
              continue
            fi

            subject=$(git log "$base_head".."$branch" --format='%s' | head -1)
            echo "Pushing $branch ($subject)..."
            git push -f origin "$branch"

            # Create or update PR
            existing_pr=$(gh pr list --base "$BRANCH_NAME" --head "$branch" --json number --jq '.[0].number // empty' 2>/dev/null || true)

            if [ -n "$existing_pr" ]; then
              gh pr edit "$existing_pr" --title "$subject"
              echo "PR #$existing_pr updated for $branch"
            else
              pr_body="Automated dependency update.\n\n**Branch:** \`$branch\`\n\nValidated on both x86_64-linux and aarch64-darwin via CI.\nMerge when checks pass.\n\n---\nGenerated by the update pipeline."
              echo -e "$pr_body" > "$RUNNER_TEMP/pr-body.md"
              gh pr create \
                --base "$BRANCH_NAME" \
                --head "$branch" \
                --title "$subject" \
                --body-file "$RUNNER_TEMP/pr-body.md" || echo "PR creation failed for $branch"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Upload update report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-report
          path: .update-report.txt
          if-no-files-found: ignore

      - name: Print update report
        if: always()
        run: |
          if [ -f .update-report.txt ]; then
            echo "::group::Update Report"
            bash dev/scripts/update-report.sh
            echo "::endgroup::"
          else
            echo "No report generated"
          fi
