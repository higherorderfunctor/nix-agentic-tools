# CI pipeline: update sources → build per-platform → commit.
#
# Phase 1: update sources + compute dep hashes (ubuntu-only)
# Phase 2: build packages + warm devenv cache (per-platform)
# Phase 3: commit (only if ALL builds pass)
#
# Packages are built directly with nix-fast-build (no devenv eval).
# cachix-action daemon pushes every completed derivation immediately.
# devenv cache is warmed LAST — overlay packages are cachix hits by then.
# See docs/superpowers/specs/2026-04-10-ci-update-pipeline-design.md
name: Update

# Disabled: pipeline needs rewrite for nix-update era (see CI v3 spec).
# Re-enable after CI v3 implementation.
on:
  workflow_dispatch:

concurrency:
  group: update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

# TODO: remove once DeterminateSystems/nix-installer-action ships node24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Phase 1: update sources + compute hashes (ubuntu-only) ───────
  update-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
      # Daemon mode here too: dep derivations built during hash
      # computation (pnpmDeps, cargoDeps, etc.) get pushed to cachix
      # so Phase 2 runners don't rebuild them.
      - uses: cachix/cachix-action@v17
        with:
          name: nix-agentic-tools
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Update flake inputs
        run: nix develop .#ci -c nix flake update
      - name: Update devenv lock
        run: nix develop .#ci -c devenv update
      - name: Update nvfetcher sources
        run: nix develop .#ci -c nvfetcher -c config/nvfetcher/nvfetcher.toml -o overlays/sources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Regenerate npm lockfiles
        run: nix develop .#ci -c bash dev/scripts/update-locks.sh
      # Restore hashes from previous runs so unchanged packages skip
      # instantly. save-always persists even when later steps fail,
      # so a failed build doesn't force full recomputation next run.
      - name: Restore cached hashes
        uses: actions/cache@v4
        with:
          path: overlays/sources/hashes.json
          key: dep-hashes-${{ hashFiles('overlays/sources/generated.nix') }}
          restore-keys: dep-hashes-
          save-always: true
      # Dep hashes (cargoHash, npmDepsHash, pnpmDepsHash, vendorHash)
      # are platform-independent — compute once on Linux. Only packages
      # with changed sources get recomputed; cached hashes pass through.
      - name: Compute dep hashes
        run: nix develop -L .#ci -c bash dev/scripts/update-hashes.sh
      - name: Upload updated sources
        uses: actions/upload-artifact@v4
        with:
          name: updated-sources
          path: |
            overlays/sources/
            flake.lock
            devenv.lock

  # ── Phase 2: per-platform build + devenv cache ───────────────────
  build:
    needs: update-sources
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: updated-sources
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
      # Daemon mode: pushes every completed derivation to cachix
      # immediately via post-build-hook. Even if a later step fails,
      # successful builds are already in the cache for next run.
      - uses: cachix/cachix-action@v17
        with:
          name: nix-agentic-tools
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      # Build ALL packages directly — no devenv eval needed. Hashes
      # were already computed in Phase 1 and are in the sources artifact.
      # --inputs-from . resolves nix-fast-build from the flake input
      # (github:Mic92/nix-fast-build), not the nixpkgs-packaged version.
      # --skip-cached checks cachix substituter, skips cached packages.
      # No --cachix-cache: the daemon handles push (avoids double-push).
      # No continue-on-error: failures must block commit.
      - name: Build all packages
        run: |
          nix run --inputs-from . nix-fast-build -- \
            --skip-cached \
            --no-nom \
            --no-link \
            --flake ".#packages.${{ matrix.system }}"
      # Warm devenv cache AFTER building packages. Overlay packages
      # are cachix hits from the build step; only devenv-specific
      # glue (profile, shell-env, git-hook wrappers) builds locally.
      # Pushes devenv profile to cachix so `devenv shell` is instant
      # for consumers on all platforms.
      - name: Warm devenv cache
        run: |
          nix profile install --inputs-from . nixpkgs#devenv
          devenv print-dev-env --verbose > /dev/null
        env:
          DEVENV_TUI: "false"

  # ── Phase 3: merge hashes + commit ───────────────────────────────
  # Only runs if ALL Phase 2 jobs succeed (default needs: behavior).
  commit:
    needs: [update-sources, build]
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: refactor/ai-factory-architecture
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      # Sources artifact includes hashes.json (computed in Phase 1).
      - uses: actions/download-artifact@v4
        with:
          name: updated-sources
      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: automated update (sources + hashes) [skip ci]"
            git pull --rebase origin "$BRANCH_NAME" || true
            git push origin "HEAD:$BRANCH_NAME"
          fi
