# CI pipeline v4: ninja-based DAG update pipeline.
#
# Renovate-style: each dependency update gets its own PR against the
# working branch. PRs trigger ci.yml which builds on both platforms.
# Only PRs that pass both x86_64-linux and aarch64-darwin can merge.
#
# Phase 1 (ubuntu): run ninja pipeline (cherry-picks to local branch)
# Phase 2 (ubuntu): for each update commit, push to update/<name>
#   branch and create/update a PR
#
# On re-run, existing update branches are rebased on the current
# branch tip and the update is redone.
#
# See: config/generate-update-ninja.nix, dev/scripts/update-*.sh
name: Update

on:
  push:
    branches: [refactor/ai-factory-architecture]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BRANCH_NAME: refactor/ai-factory-architecture

jobs:
  update:
    runs-on: ubuntu-latest
    # Skip if this push was made by the bot (prevents self-triggering).
    if: >-
      github.actor != 'github-actions[bot]'
      || github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: nix-agentic-tools
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install pipeline tools
        run: |
          nix profile install \
            nixpkgs#ninja \
            nixpkgs#jq
          nix profile install --inputs-from . nixpkgs#devenv
          nix profile install ".#formatter.x86_64-linux"

      # Record the base commit before the pipeline runs.
      # Update commits will be between base and HEAD after the pipeline.
      - name: Record base commit
        id: base
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Run the ninja pipeline. Each target cherry-picks to the local
      # branch on success. After this step, HEAD has all update commits.
      - name: Run ninja update pipeline
        run: |
          set -euETo pipefail
          shopt -s inherit_errexit 2>/dev/null || :
          mkdir -p "$RUNNER_TEMP"
          export MERGE_LOCK="$RUNNER_TEMP/nix-update-merge"
          nix run .#generate-update-ninja
          ninja -j4 -v -k0 -f .update.ninja update-report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # For each update commit (between base and HEAD), create or
      # update a branch and PR. Each PR targets the working branch.
      # ci.yml will validate on both platforms.
      #
      # Branch naming: update/<sanitized-commit-subject>
      # Existing branches are force-updated (rebased implicitly since
      # the base moved and the update was redone).
      - name: Create per-dependency PRs
        run: |
          set -euETo pipefail
          shopt -s inherit_errexit 2>/dev/null || :

          base="${{ steps.base.outputs.sha }}"
          head=$(git rev-parse HEAD)

          if [ "$base" = "$head" ]; then
            echo "No update commits — nothing to PR"
            exit 0
          fi

          # Iterate each commit between base and HEAD
          git rev-list --reverse "$base".."$head" | while read -r sha; do
            subject=$(git log -1 --format='%s' "$sha")

            # Extract dependency name from commit subject
            # Formats: "chore: update input <name>" or "chore(overlays): update <name>"
            dep_name=$(echo "$subject" | sed -E 's/^chore(\([^)]*\))?: update (input )?//' | tr ' +' '-')

            # Skip non-update commits (treefmt, etc.)
            if [[ ! "$subject" =~ ^chore ]]; then
              echo "Skipping non-update commit: $subject"
              continue
            fi

            branch_name="update/$dep_name"
            echo "Processing: $subject -> $branch_name"

            # Create branch from the base with just this commit
            git checkout -B "$branch_name" "$base"
            git cherry-pick "$sha" || {
              echo "Cherry-pick failed for $dep_name, skipping"
              git cherry-pick --abort 2>/dev/null || true
              git checkout "$BRANCH_NAME"
              continue
            }

            # Push branch (force update if it exists from a prior run)
            git push -f origin "$branch_name"

            # Create or update PR
            existing_pr=$(gh pr list --base "$BRANCH_NAME" --head "$branch_name" --json number --jq '.[0].number // empty' || true)
            if [ -n "$existing_pr" ]; then
              echo "PR #$existing_pr already exists for $branch_name — updated branch"
            else
              gh pr create \
                --base "$BRANCH_NAME" \
                --head "$branch_name" \
                --title "$subject" \
                --body "$(cat <<EOF
Automated dependency update.

**Commit:** \`$sha\`
**Branch:** \`$branch_name\`

This PR will be validated on both x86_64-linux and aarch64-darwin via CI.
Merge when checks pass.

---
Generated by the update pipeline. See \`.github/workflows/update.yml\`.
EOF
              )" || echo "PR creation failed for $branch_name"
            fi

            # Return to the main branch for the next iteration
            git checkout "$BRANCH_NAME"
          done

          # Reset to HEAD (the full accumulated state) for the report
          git checkout "$BRANCH_NAME"
          git reset --hard "$head"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload update report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-report
          path: .update-report.txt
          if-no-files-found: ignore

      - name: Print update report
        if: always()
        run: |
          if [ -f .update-report.txt ]; then
            echo "::group::Update Report"
            bash dev/scripts/update-report.sh
            echo "::endgroup::"
          else
            echo "No report generated"
          fi
