# CI pipeline v4: ninja-based DAG update pipeline.
#
# Runs the same ninja update pipeline used locally:
#   init → input updates (parallel) → package updates (parallel, -j4)
#   → treefmt → final build → report
#
# Phase 1 (ubuntu): run ninja pipeline, push per-target commits
# Phase 2 (per-platform matrix): build all packages, warm devenv cache
#
# Each ninja target runs in a git worktree, builds to validate,
# and cherry-picks commits to the branch on success. Failed targets
# are reported but don't block other updates.
#
# See: config/generate-update-ninja.nix, dev/scripts/update-*.sh
name: Update

on:
  push:
    branches: [refactor/ai-factory-architecture]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BRANCH_NAME: refactor/ai-factory-architecture

jobs:
  # ── Phase 1: ninja update pipeline (ubuntu-only) ─────────────────
  update:
    runs-on: ubuntu-latest
    # Skip if this push was made by the bot (prevents self-triggering).
    # Manual dispatch and schedule always run.
    if: >-
      github.actor != 'github-actions[bot]'
      || github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      # Daemon mode: derivations built during nix-update get pushed
      # to cachix immediately. Phase 2 runners fetch as substitutions.
      - uses: cachix/cachix-action@v17
        with:
          name: nix-agentic-tools
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Install tools the ninja pipeline needs in PATH.
      # nix-fast-build and nix-update resolve via `nix run --inputs-from .`
      - name: Install pipeline tools
        run: |
          nix profile install \
            nixpkgs#ninja \
            nixpkgs#jq
          nix profile install --inputs-from . nixpkgs#devenv
          nix profile install ".#formatter.x86_64-linux"

      # Generate ninja build file and run the full DAG.
      # MERGE_LOCK overridden: /run/user/$UID/ may not exist on GHA.
      - name: Run ninja update pipeline
        run: |
          set -euETo pipefail
          shopt -s inherit_errexit 2>/dev/null || :
          mkdir -p "$RUNNER_TEMP"
          export MERGE_LOCK="$RUNNER_TEMP/nix-update-merge"
          nix run .#generate-update-ninja
          ninja -j4 -v -k0 -f .update.ninja update-report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Push commits from the ninja pipeline.
      # Rebase on remote if it moved during the run. Never force push.
      - name: Push updates
        run: |
          set -euETo pipefail
          shopt -s inherit_errexit 2>/dev/null || :
          local_head=$(git rev-parse HEAD)
          remote_head=$(git rev-parse "origin/$BRANCH_NAME" 2>/dev/null || echo "none")
          if [ "$local_head" = "$remote_head" ]; then
            echo "No changes to push"
            exit 0
          fi
          git fetch origin "$BRANCH_NAME"
          max_retries=3
          for attempt in $(seq 1 $max_retries); do
            if git pull --rebase origin "$BRANCH_NAME"; then
              if git push origin "HEAD:$BRANCH_NAME"; then
                echo "Pushed successfully (attempt $attempt)"
                exit 0
              fi
            fi
            echo "Push attempt $attempt failed, retrying..."
            git fetch origin "$BRANCH_NAME"
          done
          echo "::error::Failed to push after $max_retries attempts"
          exit 1

      - name: Upload update report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-report
          path: .update-report.txt
          if-no-files-found: ignore

      - name: Print update report
        if: always()
        run: |
          if [ -f .update-report.txt ]; then
            echo "::group::Update Report"
            bash dev/scripts/update-report.sh
            echo "::endgroup::"
          else
            echo "No report generated"
          fi

  # ── Phase 2: per-platform build + cache warm ────────────────────
  build:
    needs: update
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.BRANCH_NAME }}

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      # Daemon mode: pushes every completed derivation to cachix.
      - uses: cachix/cachix-action@v17
        with:
          name: nix-agentic-tools
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Build ALL packages. Most x86_64-linux packages cached from
      # Phase 1 ninja builds. aarch64-darwin builds fresh here.
      - name: Build all packages
        run: |
          nix run --inputs-from . nix-fast-build -- \
            --skip-cached \
            --no-nom \
            --no-link \
            --flake ".#packages.${{ matrix.system }}"

      # Warm devenv cache. Overlay packages are cachix hits from the
      # build step; only devenv-specific glue builds locally.
      - name: Warm devenv cache
        run: |
          nix profile install --inputs-from . nixpkgs#devenv
          devenv print-dev-env --verbose > /dev/null
        env:
          DEVENV_TUI: "false"
