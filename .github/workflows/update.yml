name: Update

on:
  push:
    branches: [refactor/ai-factory-architecture]
  schedule:
    - cron: "0 */1 * * *" # hourly
  workflow_dispatch:

concurrency:
  group: update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

# TODO: remove once DeterminateSystems/nix-installer-action ships node24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    env:
      BRANCH_NAME: refactor/ai-factory-architecture
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: nix-agentic-tools
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Run update pipeline
        run: devenv tasks run --mode before update:all
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify
        run: nix flake check --no-build

      - name: Build all packages (populates cachix)
        run: |
          nix profile install nixpkgs#nix-fast-build
          nix-fast-build \
            --flake ".#packages" \
            --systems "${{ matrix.system }}" \
            --skip-cached \
            --cachix-cache nix-agentic-tools \
            --no-nom \
            --no-link

      # Only commit from linux runner to avoid race conditions
      - name: Commit updates
        if: matrix.system == 'x86_64-linux'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: automated update (sources + hashes)"
            git pull --rebase origin "$BRANCH_NAME" || true
            git push origin "HEAD:$BRANCH_NAME"
          fi
