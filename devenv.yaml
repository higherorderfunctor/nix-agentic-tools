# Allow unfree packages (claude-code, copilot-cli, kiro-cli) for this
# repo's dev shell. The overlay's ensureUnfreeCheck guard handles
# consumer protection.
allowUnfree: true

inputs:
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  nix-fast-build:
    url: github:Mic92/nix-fast-build
    inputs:
      nixpkgs:
        follows: nixpkgs
  nix-update:
    url: github:Mic92/nix-update
    inputs:
      nixpkgs:
        follows: nixpkgs
  rust-overlay:
    url: github:oxalica/rust-overlay
    inputs:
      nixpkgs:
        follows: nixpkgs
  serena:
    url: github:oraios/serena
    inputs:
      nixpkgs:
        follows: nixpkgs
  treefmt-nix:
    url: github:numtide/treefmt-nix
    inputs:
      nixpkgs:
        follows: nixpkgs
