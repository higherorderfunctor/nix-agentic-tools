src.branch = "main"
fetch.github = "isaacphi/mcp-language-server"

[mcp-proxy]
src.git = "https://github.com/sparfenyuk/mcp-proxy.git"
src.use_commit = true
src.branch = "main"
fetch.github = "sparfenyuk/mcp-proxy"

# Mono-repo: sequential-thinking-mcp, fetch-mcp, git-mcp
[modelcontextprotocol-servers]
src.git = "https://github.com/modelcontextprotocol/servers.git"
src.use_commit = true
src.branch = "main"
fetch.github = "modelcontextprotocol/servers"

[openmemory-mcp]
src.git = "https://github.com/CaviraOSS/OpenMemory.git"
