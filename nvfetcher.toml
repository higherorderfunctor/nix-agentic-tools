# ── Dependencies (PyPI) ──────────────────────────────────────────

# kagiapi: GitHub repo (kagisearch/kagiapi) is behind PyPI. Stays PyPI.
[kagiapi]
src.pypi = "kagiapi"
fetch.pypi = "kagiapi"
