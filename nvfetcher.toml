# Unified version tracking for all packages.
# Run: nvfetcher -o .nvfetcher -k ~/.config/nvfetcher/keyfile.toml
#
# Pattern: prefer GitHub source over npm/PyPI tarballs so the build
# starts from the same source tree as nixpkgs. When the repo uses
# scoped tags (e.g. @upstash/context7-mcp@<ver>), use github_tag +
# include_regex + from_pattern to extract the version, and fetch.url
# with url.name to dodge @ in Nix store paths. The overlay unpacks
# fetchurl tarballs via runCommandLocal when nixpkgs expects a
# directory-type $src.

# ── Dev tools ─────────────────────────────────────────────────────

[agnix]
src.github = "agent-sh/agnix"
fetch.github = "agent-sh/agnix"

# ── AI CLIs ──────────────────────────────────────────────────────

[any-buddy]
src.github = "cpaczek/any-buddy"
fetch.github = "cpaczek/any-buddy"

[claude-code]
src.cmd = "curl -s https://registry.npmjs.org/@anthropic-ai/claude-code/latest | jq -r .version"
fetch.url = "https://registry.npmjs.org/@anthropic-ai/claude-code/-/claude-code-$ver.tgz"

[github-copilot-cli]
src.github = "github/copilot-cli"
src.from_pattern = "v([0-9]+\\.[0-9]+\\.[0-9]+)$"
src.exclude_regex = ".*-[0-9]+$"
src.to_pattern = "\\1"
fetch.url = "https://github.com/github/copilot-cli/releases/download/v$ver/copilot-linux-x64.tar.gz"

[kiro-cli]
src.cmd = "curl -s https://desktop-release.q.us-east-1.amazonaws.com/latest/manifest.json | jq -r '.version'"
fetch.url = "https://desktop-release.q.us-east-1.amazonaws.com/$ver/kirocli-x86_64-linux.tar.gz"

[kiro-cli-darwin]
src.cmd = "curl -s https://desktop-release.q.us-east-1.amazonaws.com/latest/manifest.json | jq -r '.version'"
fetch.url = "https://desktop-release.q.us-east-1.amazonaws.com/$ver/Kiro%20CLI.dmg"
url.name = "kiro-cli.dmg"

[kiro-gateway]
src.git = "https://github.com/jwadow/kiro-gateway.git"
src.use_commit = true
src.branch = "main"
fetch.git = "https://github.com/jwadow/kiro-gateway.git"

# ── Git tools ─────────────────────────────────────────────────────

[git-absorb]
src.github = "tummychow/git-absorb"
fetch.github = "tummychow/git-absorb"

[git-branchless]
src.github = "arxanas/git-branchless"
fetch.github = "arxanas/git-branchless"

[git-revise]
src.pypi = "git-revise"
src.from_pattern = "^(.*)$"
src.to_pattern = "v\\1"
fetch.github = "mystor/git-revise"

# ── MCP servers: GitHub ───────────────────────────────────────────

[context7-mcp]
src.github_tag = "upstash/context7"
src.include_regex = "^@upstash/context7-mcp@[0-9]+\\.[0-9]+\\.[0-9]+$"
src.from_pattern = "^@upstash/context7-mcp@([0-9]+\\.[0-9]+\\.[0-9]+)$"
src.to_pattern = "\\1"
fetch.url = "https://github.com/upstash/context7/archive/refs/tags/@upstash/context7-mcp@$ver.tar.gz"
url.name = "context7--upstash-context7-mcp_$ver.tar.gz"

[github-mcp-server]
src.github = "github/github-mcp-server"
fetch.github = "github/github-mcp-server"

[git-intel-mcp]
src.git = "https://github.com/hoangsonww/GitIntel-MCP-Server.git"
src.use_commit = true
src.branch = "master"
fetch.git = "https://github.com/hoangsonww/GitIntel-MCP-Server.git"

[mcp-language-server]
src.github = "isaacphi/mcp-language-server"
fetch.github = "isaacphi/mcp-language-server"

[sympy-mcp]
src.git = "https://github.com/sdiehl/sympy-mcp.git"
src.use_commit = true
src.branch = "main"
fetch.github = "sdiehl/sympy-mcp"

# ── MCP servers: npm ──────────────────────────────────────────────
# TODO: these fetch from npm registry tarballs. Prefer GitHub source
# where possible (see context7-mcp pattern above). Each needs manual
# review to find the upstream repo + check for GitHub releases.

# Upstream: https://github.com/tim-smart/effect-mcp (tagged releases)
[effect-mcp]
src.github = "tim-smart/effect-mcp"
fetch.github = "tim-smart/effect-mcp"

# Upstream: https://github.com/openmemory/openmemory
# STAYS npm: no GitHub releases or tags. npm is the only versioned source.
# TODO: revisit when upstream adds releases.
[openmemory-mcp]
src.cmd = "curl -s https://registry.npmjs.org/openmemory-js/latest | jq -r .version"
fetch.url = "https://registry.npmjs.org/openmemory-js/-/openmemory-js-$ver.tgz"

# Upstream: https://github.com/modelcontextprotocol/servers (mono-repo)
# STAYS npm: mono-repo tags are `typescript-servers-X.Y.Z` not per-package.
# Individual package versions track npm, not GitHub releases.
# TODO: revisit when/if upstream adds per-package tags.
[sequential-thinking-mcp]
src.cmd = "curl -s https://registry.npmjs.org/@modelcontextprotocol/server-sequential-thinking/latest | jq -r .version"
fetch.url = "https://registry.npmjs.org/@modelcontextprotocol/server-sequential-thinking/-/server-sequential-thinking-$ver.tgz"

# ── MCP servers: PyPI ─────────────────────────────────────────────

# Upstream: https://github.com/kagisearch/kagimcp (tagged releases)
# kagiapi is a dependency — no GitHub releases, stays PyPI.
[kagiapi]
src.pypi = "kagiapi"
fetch.pypi = "kagiapi"

[kagimcp]
# Has tags (v0.1.5) but no GitHub Releases — use git tag tracking
src.git = "https://github.com/kagisearch/kagimcp.git"
src.branch = "main"
src.use_max_tag = true
fetch.github = "kagisearch/kagimcp"

# Upstream: https://github.com/sparfenyuk/mcp-proxy (tagged releases)
[mcp-proxy]
src.github = "sparfenyuk/mcp-proxy"
fetch.github = "sparfenyuk/mcp-proxy"

# Upstream: https://github.com/modelcontextprotocol/servers (mono-repo)
# STAYS PyPI: mono-repo, no per-package GitHub tags.
[mcp-server-fetch]
src.pypi = "mcp-server-fetch"
fetch.pypi = "mcp_server_fetch"

[mcp-server-git]
src.pypi = "mcp-server-git"
fetch.pypi = "mcp_server_git"
