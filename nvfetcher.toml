# Unified version tracking for all packages.
# Run: nvfetcher -o .nvfetcher -k ~/.config/nvfetcher/keyfile.toml
#
# Pattern: GitHub source, track main branch unless there's a specific
# reason for releases/tags (proprietary binaries, scoped npm tags).
# Overlays read version from source at eval time where possible.

# ── Dev tools ─────────────────────────────────────────────────────

[agnix]
src.git = "https://github.com/agent-sh/agnix.git"
src.use_commit = true
src.branch = "main"
fetch.github = "agent-sh/agnix"

# ── AI CLIs ──────────────────────────────────────────────────────

[any-buddy]
src.git = "https://github.com/cpaczek/any-buddy.git"
src.use_commit = true
src.branch = "main"
fetch.github = "cpaczek/any-buddy"

# Proprietary — npm IS the primary distribution
[claude-code]
src.cmd = "curl -s https://registry.npmjs.org/@anthropic-ai/claude-code/latest | jq -r .version"
fetch.url = "https://registry.npmjs.org/@anthropic-ai/claude-code/-/claude-code-$ver.tgz"

# Proprietary pre-built binary
[github-copilot-cli]
src.github = "github/copilot-cli"
src.from_pattern = "v([0-9]+\\.[0-9]+\\.[0-9]+)$"
src.exclude_regex = ".*-[0-9]+$"
src.to_pattern = "\\1"
fetch.url = "https://github.com/github/copilot-cli/releases/download/v$ver/copilot-linux-x64.tar.gz"

# Proprietary pre-built binary
[kiro-cli]
src.cmd = "curl -s https://desktop-release.q.us-east-1.amazonaws.com/latest/manifest.json | jq -r '.version'"
fetch.url = "https://desktop-release.q.us-east-1.amazonaws.com/$ver/kirocli-x86_64-linux.tar.gz"

[kiro-cli-darwin]
src.cmd = "curl -s https://desktop-release.q.us-east-1.amazonaws.com/latest/manifest.json | jq -r '.version'"
fetch.url = "https://desktop-release.q.us-east-1.amazonaws.com/$ver/Kiro%20CLI.dmg"
url.name = "kiro-cli.dmg"

[kiro-gateway]
src.git = "https://github.com/jwadow/kiro-gateway.git"
src.use_commit = true
src.branch = "main"
fetch.git = "https://github.com/jwadow/kiro-gateway.git"

# ── Git tools ─────────────────────────────────────────────────────

[git-absorb]
src.git = "https://github.com/tummychow/git-absorb.git"
src.use_commit = true
src.branch = "master"
fetch.github = "tummychow/git-absorb"

[git-branchless]
src.git = "https://github.com/arxanas/git-branchless.git"
src.use_commit = true
src.branch = "master"
fetch.github = "arxanas/git-branchless"

[git-revise]
src.git = "https://github.com/mystor/git-revise.git"
src.use_commit = true
src.branch = "main"
fetch.github = "mystor/git-revise"

# ── MCP servers ───────────────────────────────────────────────────

# Scoped npm tags — needs url.name workaround for @ in store paths
[context7-mcp]
src.github_tag = "upstash/context7"
src.include_regex = "^@upstash/context7-mcp@[0-9]+\\.[0-9]+\\.[0-9]+$"
src.from_pattern = "^@upstash/context7-mcp@([0-9]+\\.[0-9]+\\.[0-9]+)$"
src.to_pattern = "\\1"
fetch.url = "https://github.com/upstash/context7/archive/refs/tags/@upstash/context7-mcp@$ver.tar.gz"
url.name = "context7--upstash-context7-mcp_$ver.tar.gz"

[effect-mcp]
src.git = "https://github.com/tim-smart/effect-mcp.git"
src.use_commit = true
src.branch = "main"
fetch.github = "tim-smart/effect-mcp"

[git-intel-mcp]
src.git = "https://github.com/hoangsonww/GitIntel-MCP-Server.git"
src.use_commit = true
src.branch = "master"
fetch.git = "https://github.com/hoangsonww/GitIntel-MCP-Server.git"

[github-mcp-server]
src.github = "github/github-mcp-server"
fetch.github = "github/github-mcp-server"

[kagimcp]
src.git = "https://github.com/kagisearch/kagimcp.git"
src.use_commit = true
src.branch = "main"
fetch.github = "kagisearch/kagimcp"

[mcp-language-server]
src.git = "https://github.com/isaacphi/mcp-language-server.git"
